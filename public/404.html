<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>DKIND TEX</title>
    <script>
      var path = window.location.pathname;
      var repo = '/dkindtex-website';
      var search = window.location.search;
      var hash = window.location.hash;
      var redirect =
        repo +
        '/?p=' +
        encodeURIComponent(path.replace(repo, '') + search) +
        (hash ? '&hash=' + encodeURIComponent(hash) : '');

      window.location.replace(redirect);
    </script>
  </head>
  <body></body>
</html>
